spring:
  application:
    name: webrtc
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vdt_webrtc}
    username: ${DB_USERNAME:vdt}
    password: ${DB_PASSWORD:vdt_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  secret: ${JWT_SECRET:dev-only-secret-not-for-prod-change-me-min-32-chars-12345}
  access-token-ttl-ms: ${JWT_ACCESS_TTL_MS:3600000} # 1h for dev convenience; tighten (e.g. 900000) in prod
