spring:
  application:
    name: webrtc
  datasource:
    url: jdbc:postgresql://localhost:5432/vdt_webrtc
    username: vdt
    password: vdt_pass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  secret: ${JWT_SECRET}
  access-token-ttl-ms: 900000
