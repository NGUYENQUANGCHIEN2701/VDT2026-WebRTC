spring:
  application:
    name: webrtc
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vdt_webrtc}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:27012005}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  secret: ${JWT_SECRET:dev-only-secret-not-for-prod-change-me-min-32-chars-12345}
  access-token-ttl-ms: ${JWT_ACCESS_TTL_MS:3600000} # 1h for dev convenience; tighten (e.g. 900000) in prod
app:
  cookie:
    secure: ${COOKIE_SECURE:false}
turn:
  secret: ${TURN_SECRET:dev-turn-secret}
  server: ${TURN_SERVER:127.0.0.1:3478}
  credential-ttl-seconds: ${TURN_TTL:86400}
call:
  ring-timeout-seconds: ${CALL_RING_TIMEOUT_SECONDS:30}
  grace-period-seconds: ${CALL_GRACE_PERIOD_SECONDS:15}