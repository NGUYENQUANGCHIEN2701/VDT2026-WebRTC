spring:
  application:
    name: webrtc
  threads:
    virtual:
      enabled: true # spike 002b: removes WS/Tomcat thread-per-connection ceiling; ws_connecting stayed <~400ms to 4000 conns vs 30-50s on platform threads
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vdt_webrtc}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:dev-only-postgres-password-change-me}
    hikari:
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:20} # spike 002b: Boot's undocumented default of 10 exhausted (HikariPool-1 ... timed out after 30353ms, waiting=96) once virtual threads removed the upstream WS ceiling; 20 doubles it while staying under Postgres max_connections=100 across both backend replicas
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 1s
          multiplier: 2.0
          max-retries: 3
          max-interval: 10s
  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

jwt:
  secret: ${JWT_SECRET:dev-only-secret-not-for-prod-change-me-min-32-chars-12345}
  access-token-ttl-ms: ${JWT_ACCESS_TTL_MS:3600000} # 1h for dev convenience; tighten (e.g. 900000) in prod
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cookie:
    secure: ${COOKIE_SECURE:false}
  password-reset:
    expose-token: ${PASSWORD_RESET_EXPOSE_TOKEN:false}
  email-verification:
    auto-verify-domains: ${EMAIL_AUTO_VERIFY_DOMAINS:}
  rate-limit:
    otp-window-seconds: ${RATE_LIMIT_OTP_WINDOW_SECONDS:900}
    otp-max-requests: ${RATE_LIMIT_OTP_MAX_REQUESTS:5}
  instance-id: ${INSTANCE_ID:${HOSTNAME:unknown}}
  # WS handshake origin whitelist — dùng CHUNG env ALLOWED_ORIGINS với CORS REST (CorsConfig).
  # Default gồm cả 8080 (nginx serve SPA cùng origin) lẫn 5173 (Vite dev).
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173,https://localhost:5173}
turn:
  secret: ${TURN_SECRET:dev-turn-secret}
  server: ${TURN_SERVER:127.0.0.1:3478}
  credential-ttl-seconds: ${TURN_TTL:86400}
google:
  client-id: ${GOOGLE_CLIENT_ID:}
call:
  ring-timeout-seconds: ${CALL_RING_TIMEOUT_SECONDS:30}
  grace-period-seconds: ${CALL_GRACE_PERIOD_SECONDS:15}
