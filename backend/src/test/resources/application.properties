# Test-scope override: bump rate-limit cap to a very high value so the entire test suite
# can call /register, /resend-verification-otp, and /forgot-password freely without hitting
# the fixed-window Redis counter within a single Testcontainers run.
# This file lives in src/test/resources and is NOT included in the production JAR.
app.rate-limit.otp-max-requests=10000
app.rate-limit.otp-window-seconds=1
