global:
  scrape_interval: 15s

scrape_configs:
  # Scrapes backend-1/backend-2 directly on the internal compose network —
  # never through nginx (D-05). Bare compose service names, not localhost.
  - job_name: vdt-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['backend-1:8080', 'backend-2:8080']
        labels:
          group: vdt-webrtc
