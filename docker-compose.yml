# Full-stack run: `docker compose up --build`
# Reads credentials from .env (copy from .env.example first).
# Scope: postgres + backend only. redis/rabbitmq/frontend/LB are added in later phases.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Host 5433 -> container 5432 to avoid clashing with a local Postgres on 5432.
      # The backend connects internally on 5432 via the compose network, not this mapping.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Host is the compose service name "postgres", internal port 5432.
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TURN_SECRET: ${TURN_SECRET}
      TURN_SERVER: ${TURN_SERVER}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  coturn:                                    # ← 2 dấu cách (ngang postgres/backend)
    image: coturn/coturn:4.6
    restart: unless-stopped
    # LINUX (máy demo): host networking — UDP relay qua Docker bridge NAT là lỗi TURN #1.
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    # Secret + external-ip inject qua command (compose interpolate ${...} từ .env).
    command: >
      -c /etc/coturn/turnserver.conf
      --static-auth-secret=${TURN_SECRET}
      --external-ip=${HOST_IP}
    # --- WINDOWS/MAC fallback (bỏ network_mode:host, mở port tay) ---
    # ports:
    #   - "3478:3478/udp"
    #   - "3478:3478/tcp"
    #   - "49160-49200:49160-49200/udp"

volumes:
  pgdata:

