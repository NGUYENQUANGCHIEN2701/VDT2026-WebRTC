# Full-stack run: `docker compose up --build`
# Reads credentials from .env (copy from .env.example first).

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Host 5433 -> container 5432 to avoid clashing with a local Postgres on 5432.
      # The backend connects internally on 5432 via the compose network, not this mapping.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Two signaling instances behind nginx (Phase 6 horizontal-scaling demo).
  # No host port mapping — nginx is the sole external entry point on 8080.
  # Each instance gets a distinct INSTANCE_ID → distinct Redis route/pub-sub channel.
  backend-1:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # Host is the compose service name "postgres", internal port 5432.
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Redis runs as the compose service "redis" on its default port 6379.
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: ${JWT_SECRET}
      TURN_SECRET: ${TURN_SECRET}
      TURN_SERVER: ${TURN_SERVER}
      INSTANCE_ID: backend-1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  backend-2:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: ${JWT_SECRET}
      TURN_SECRET: ${TURN_SECRET}
      TURN_SERVER: ${TURN_SERVER}
      INSTANCE_ID: backend-2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # Load balancer + WebSocket-aware reverse proxy + frontend SPA. Sole external entry point.
  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
    ports:
      # Host 8080 -> nginx 80 (same external port as the old single backend).
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 10

  coturn:
    image: coturn/coturn:4.6
    restart: unless-stopped
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    # Secret + external-ip inject qua command (compose interpolate ${...} từ .env).
    command: >
      -c /etc/coturn/turnserver.conf
      --static-auth-secret=${TURN_SECRET}
      --external-ip=${HOST_IP}
    # WINDOWS/MAC (Docker Desktop): map port tường minh — host networking KHÔNG hoạt động thật.
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"
    # --- LINUX (máy demo) thay 3 dòng ports trên + bỏ comment dòng dưới (relay UDP qua bridge hay hỏng) ---
    # network_mode: host
  redis:
    image: redis:7-alpine
    # No persistence: call-state is ephemeral (TTL ~300s), losing it on restart is fine.
    ports:
      # Optional host mapping — backend connects internally as "redis:6379".
      # Handy for redis-cli / RedisInsight from the host.
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
  rabbitmq:
    image: rabbitmq:4.1-management
    ports:
      - "5672:5672"     # AMQP (app kết nối)
      - "15672:15672"   # Management UI — http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

