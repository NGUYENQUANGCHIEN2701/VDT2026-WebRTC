# PROD (AWS EC2) — TLS qua Let's Encrypt, đè lên default.conf trong image bằng
# docker-compose.prod.yml. Bản dev HTTP-only nằm ở nginx/conf.d/vdt.conf (bake vào image).
# Round-robin qua backend-1/backend-2, KHÔNG sticky session: Redis pub/sub đã lo
# định tuyến cross-instance nên instance nào phục vụ client nào cũng được.

# Header Upgrade -> Connection: "upgrade" khi là WebSocket, "close" khi request thường.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend {
    server backend-1:8080;
    server backend-2:8080;
    keepalive 32;
    # Round-robin có chủ đích, KHÔNG sticky session (D-07).
}

# HTTP -> HTTPS redirect. Certbot renewal (standalone) chạy khi container này
# đang tắt nên port 80 không cần giữ riêng cho ACME challenge ở đây.
server {
    listen 80;
    server_name vdtcall.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vdtcall.site;

    ssl_certificate     /etc/letsencrypt/live/vdtcall.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vdtcall.site/privkey.pem;

    # Signaling WebSocket — cần HTTP/1.1 + header Upgrade/Connection để nâng cấp kết nối.
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        # WS giữ kết nối lâu; mặc định nginx cắt sau 60s. Heartbeat ~25s nhưng tab nền
        # có thể nhàn lâu hơn → nới lên 1h cho chắc.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API.
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — route con của React Router load qua index.html, đặt SAU /api và /ws.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
