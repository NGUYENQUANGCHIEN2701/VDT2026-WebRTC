name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run backend tests
        working-directory: backend
        run: ./mvnw -B verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Test
        working-directory: frontend
        run: npm run test:run
      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t vdt-backend:ci ./backend
      - name: Build frontend/nginx image
        run: docker build -t vdt-frontend:ci -f frontend/Dockerfile .

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vdt_webrtc
          POSTGRES_USER: vdt
          POSTGRES_PASSWORD: vdt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vdt -d vdt_webrtc"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:4.1-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics check_port_connectivity"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build backend jar
        working-directory: backend
        run: ./mvnw -B -DskipTests package
      - name: Start backend
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/vdt_webrtc
          DB_USERNAME: vdt
          DB_PASSWORD: vdt
          REDIS_HOST: localhost
          RABBITMQ_HOST: localhost
          # CI-only dummy secret — never a reference to a real secret or .env file.
          JWT_SECRET: ci-only-test-secret-min-32-characters-long
          EMAIL_AUTO_VERIFY_DOMAINS: e2e.test
        run: |
          java -jar target/*.jar &
          npx wait-on http://localhost:8080/actuator/health -t 60000
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8080
          VITE_WS_URL: ws://localhost:8080/ws
        run: |
          npm ci
          npm run build
      - name: Serve frontend build
        working-directory: frontend
        run: npx vite preview --port 4173 &
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:4173
        run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
